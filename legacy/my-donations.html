<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500;1,600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Donations</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="dashboard-nav">
        <a href="index.html" class="logo">FoodBridge</a>

        <div class="dashboard-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="donate.html">Donate Food</a>
            <a href="my-donations.html">View</a>
        </div>
    </nav>

<section class="donations-page">

    <h1>My Donations</h1>

    <div class="donations-container" id="myDonationsContainer"></div>

</section>

<script>

const container =
document.getElementById("myDonationsContainer");

const user =
JSON.parse(localStorage.getItem("registeredUser"));

let donations =
JSON.parse(localStorage.getItem("donations")) || [];

let myDonations =
donations.filter(
    donation => donation.donorEmail === user.email
);

renderMyDonations();

function renderMyDonations(){

    container.innerHTML = "";

    if(myDonations.length === 0){
        container.innerHTML =
        "<p class='empty-state'>No donations submitted yet.</p>";
        return;
    }

    myDonations.forEach((donation,index)=>{

        const card =
        document.createElement("div");

        card.classList.add("donation-card");

        const status =
        donation.claimed ? "Picked Up" : "Submitted";

        card.innerHTML = `
            <h2>${donation.foodName}</h2>

            <p><strong>Quantity:</strong> ${donation.quantity}</p>

            <p><strong>Food Type:</strong> ${donation.foodType}</p>

            <p><strong>Status:</strong> ${status}</p>

            ${!donation.claimed ? `
            <button class="claim-btn"
                onclick="deleteDonation(${index})">
                Delete
            </button>
            ` : ""}
        `;

        container.appendChild(card);
    });
}

function deleteDonation(index){

    const actualIndex =
    donations.findIndex(
        donation =>
        donation.donorEmail === user.email &&
        donation.foodName === myDonations[index].foodName
    );

    donations.splice(actualIndex,1);

    localStorage.setItem(
        "donations",
        JSON.stringify(donations)
    );

    myDonations =
    donations.filter(
        donation => donation.donorEmail === user.email
    );

    renderMyDonations();
}

</script>

</body>
</html>
