<style>
        .glass-card {
            background: rgba(255, 248, 247, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(135, 114, 112, 0.2);
            transition: all 0.3s ease;
        }
        .glass-card:hover {
            background: rgba(255, 248, 247, 0.95);
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(74, 14, 14, 0.08);
        }

<!-- TopNavBar Suppressed as per instructions for Login/Sign-in -->
<main class="flex-grow relative flex items-center justify-center min-h-screen"><button aria-label="Toggle theme" class="absolute top-8 right-8 z-20 p-3 rounded-full glass-card text-on-primary hover:scale-110 transition-transform flex items-center justify-center"><span class="material-symbols-outlined">light_mode</span></button>
<!-- Background Image -->
<div class="absolute inset-0 z-0">
<div class="w-full h-full bg-cover bg-center" data-alt="Cinematic, warm photograph of a modern community dining room. High contrast, golden hour lighting pouring through large windows, illuminating a diverse group of people sharing a meal. Editorial style, dignified, empathetic, with deep charcoal shadows and warm terracotta highlights." style="background-image: url('https://lh3.googleusercontent.com/aida/AP1WRLshMcREGuxa2Xx-uVRAhWe24sEWCMDpvjIGIwhcr0x33i67LODlpJt8N9ZIOqXKoH7otoce5S2aoYiDkGZgfLGZgqfIPG17y6XL1Dg6HPI5Nbfuk5zfQJO1wFmGz88fFu_q4F1_dm954ttcNCIFzKQdjD_2eYC74NdTAcfHOJf1OJ4ImnABbUjxZGJCXyocvTH_vZbwkhbqZCun8pNSBZTJZv4N1Qlp2ElZmtgTdJSFClQmse2vL1Ems73J')"></div>

<div class="absolute inset-0 bg-primary/40 mix-blend-multiply"></div>
<div class="absolute inset-0 bg-gradient-to-t from-primary/80 to-transparent"></div>
</div>
<!-- Sign In Content -->
<div class="relative z-10 w-full max-w-5xl px-margin-mobile md:px-margin-desktop py-20">
<div class="text-center mb-12">
<h1 class="font-display-lg-mobile text-display-lg-mobile md:font-display-lg md:text-display-lg text-on-primary mb-4 text-shadow-sm">Sign in</h1>
<p class="font-body-lg text-body-lg text-surface-variant max-w-2xl mx-auto">Select your role to continue. Choose how you want to sign in.</p>
</div>
<div class="grid grid-cols-1 md:grid-cols-3 gap-6 md:gap-gutter">
<!-- Donor Card -->
<a class="glass-card rounded-lg p-8 flex flex-col items-center text-center group" href="#">
<div class="w-16 h-16 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center mb-6 group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-3xl">storefront</span>
</div>
<h2 class="font-headline-md text-headline-md text-primary mb-3">Donor</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Post surplus food for pickup.</p>
</a>
<!-- NGO Card -->
<a class="glass-card rounded-lg p-8 flex flex-col items-center text-center group" href="#">
<div class="w-16 h-16 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center mb-6 group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-3xl">diversity_3</span>
</div>
<h2 class="font-headline-md text-headline-md text-primary mb-3">NGO</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Browse and claim donations for your organization.</p>
</a>
<!-- Volunteer Card -->
<a class="glass-card rounded-lg p-8 flex flex-col items-center text-center group" href="#">
<div class="w-16 h-16 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center mb-6 group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-3xl">local_shipping</span>
</div>
<h2 class="font-headline-md text-headline-md text-primary mb-3">Volunteer</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Accept and deliver food pickups.</p>
</a>
</div>
