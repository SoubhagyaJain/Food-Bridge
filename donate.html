<!DOCTYPE html>
<html lang="en">

<head>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500;1,600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donate Food - FoodBridge</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <nav class="dashboard-nav">
        <a href="index.html" class="logo">FoodBridge</a>

        <div class="dashboard-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="donate.html">Donate Food</a>
            <a href="my-donations.html">View</a>
        </div>
    </nav>

    <div class="login-container">

        <div class="login-box">

            <h1>Donate Food</h1>

            <p>Help reduce food waste and feed people in need.</p>

            <form id="donationForm">

    <input
        type="text"
        id="foodName"
        placeholder="Food Name">

    <input
        type="text"
        id="quantity"
        placeholder="Quantity (e.g. 20 kg)">

    <select id="foodType">
        <option>Food Type</option>
        <option>Cooked Food</option>
        <option>Raw Food</option>
        <option>Packaged Food</option>
    </select>

    <input
        type="text"
        id="pickupAddress"
        placeholder="Pickup Address">

    <textarea
        id="description"
        placeholder="Food Description"></textarea>

    <p id="donation-message"></p>

    <button type="submit">
        Submit Donation
    </button>

</form>

        </div>

    </div>
<script>

const donationForm =
document.getElementById("donationForm");

donationForm.addEventListener("submit", function(e){

    e.preventDefault();

    const foodName =
    document.getElementById("foodName").value;

    const quantity =
    document.getElementById("quantity").value;

    const foodType =
    document.getElementById("foodType").value;

    const pickupAddress =
    document.getElementById("pickupAddress").value;

    const description =
    document.getElementById("description").value;

    const message =
    document.getElementById("donation-message");

    if(
        foodName === "" ||
        quantity === "" ||
        pickupAddress === "" ||
        description === ""
    ){
        message.className = "msg-error";
        message.innerText = "Please fill all fields";
        return;
    }

    const user =
JSON.parse(localStorage.getItem("registeredUser"));

const donation = {
    foodName,
    quantity,
    foodType,
    pickupAddress,
    description,
    donorEmail: user.email,
    claimed: false
};

    let donations =
    JSON.parse(localStorage.getItem("donations")) || [];

    donations.push(donation);

    localStorage.setItem(
        "donations",
        JSON.stringify(donations)
    );

    message.className = "msg-success";
    message.innerText = "Donation Submitted Successfully!";

    donationForm.reset();

});

</script>
</body>

</html>
